<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FinEdge Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            color: #111827;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            text-align: center;
            max-width: 500px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #3B82F6; }
        p { color: #6B7280; margin-bottom: 2rem; font-size: 1.1rem; line-height: 1.6; }
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .metric {
            padding: 1rem;
            background: #F9FAFB;
            border-radius: 12px;
        }
        .metric-value { font-size: 1.5rem; font-weight: 700; color: #3B82F6; }
        .metric-label { font-size: 0.8rem; color: #6B7280; margin-top: 0.25rem; }
        .btn {
            display: inline-block;
            padding: 0.875rem 2rem;
            background: #3B82F6;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 FinEdge Dashboard</h1>
        <p>Your financial analytics platform is ready!</p>
        
        <div class="metrics">
            <div class="metric">
                <div class="metric-value">$124.5K</div>
                <div class="metric-label">Total Revenue</div>
            </div>
            <div class="metric">
                <div class="metric-value">$87.2K</div>
                <div class="metric-label">Total Expenses</div>
            </div>
            <div class="metric">
                <div class="metric-value">$37.3K</div>
                <div class="metric-label">Net Profit</div>
            </div>
            <div class="metric">
                <div class="metric-value">23</div>
                <div class="metric-label">Active Investments</div>
            </div>
        </div>
        
        <a href="/" class="btn">Refresh Page</a>
        <p style="margin-top: 1rem; font-size: 0.85rem; color: #9CA3AF;">
            React app on port 3000
        </p>
    </div>
</body>
</html>
